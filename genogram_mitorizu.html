window.addEventListener('touchmove',e=>{
  if(!fpDrag&&!fpLineDraw&&!fpStickyDrag)return;
  e.preventDefault();fpMove(fpNorm(e));
},{passive:false});
window.addEventListener('touchend',e=>{fpUp(fpNorm(e));},{passive:false});

function fpDown(e){
  if(!e._touch&&e.button!==0)return;
  e.preventDefault&&e.preventDefault();
  const p=fpGp(e);
  const sp=fpSnapPos(p);
  const hr=fpRoomAt(p.x,p.y);
  const hs=fpSymAt(p.x,p.y);
  const hl=fpLineAt(p.x,p.y);

  // ── 非選択ツール時でも、既存要素の上をクリックしたら移動できる ──
  // （選択ボタンを押さずに移動できる利便性）
  if(fpTool!=='sel' && (hs||hl||hr)){
    if(hs){
      const rot=hs.rot||0;
      const hcx=hs.x+hs.w,hcy=hs.y;
      if(Math.hypot(p.x-hcx,p.y-hcy)<14){
        const scx=hs.x+hs.w/2,scy=hs.y+hs.h/2;
        const startAngle=Math.atan2(p.y-scy,p.x-scx)*180/Math.PI;
        fpDrag={kind:'sym-rot',ref:hs,startAngle,initRot:rot,cx:scx,cy:scy};
      }else if(fpIsResize(hs,p.x,p.y)){
        fpDrag={kind:'sym-resize',ref:hs,ox:p.x-(hs.x+hs.w),oy:p.y-(hs.y+hs.h)};
      }else{
        fpDrag={kind:'sym',ref:hs,ox:p.x-hs.x,oy:p.y-hs.y};
      }
      fpSel={kind:'sym',ref:hs};
    }else if(hl){
      if(Math.hypot(p.x-hl.x1,p.y-hl.y1)<12) fpDrag={kind:'line-p1',ref:hl};
      else if(Math.hypot(p.x-hl.x2,p.y-hl.y2)<12) fpDrag={kind:'line-p2',ref:hl};
      else fpDrag={kind:'line',ref:hl,ox:p.x-hl.x1,oy:p.y-hl.y1};
      fpSel={kind:'line',ref:hl};
    }else if(hr){
      if(fpIsResize(hr,p.x,p.y)) fpDrag={kind:'room-resize',ref:hr,ox:p.x-(hr.x+hr.w),oy:p.y-(hr.y+hr.h)};
      else fpDrag={kind:'room',ref:hr,ox:p.x-hr.x,oy:p.y-hr.y};
      fpSel={kind:'room',ref:hr};
    }
    fpRender();return;
  }

  // ── 選択・移動 ──
  if(fpTool==='sel'){
    // 優先順: 設備 > 線 > 部屋（設備は常に部屋の上に重なる）
    if(hs){
      const rot=hs.rot||0;
      const hcx=hs.x+hs.w,hcy=hs.y; // 回転ハンドル位置（右上）
      if(Math.hypot(p.x-hcx,p.y-hcy)<14){
        // 回転モード: 設備中心と現在角度を保存
        const scx=hs.x+hs.w/2,scy=hs.y+hs.h/2;
        const startAngle=Math.atan2(p.y-scy,p.x-scx)*180/Math.PI;
        fpDrag={kind:'sym-rot',ref:hs,startAngle,initRot:rot,cx:scx,cy:scy};
        fpSel={kind:'sym',ref:hs};
      }else if(fpIsResize(hs,p.x,p.y)){
        fpDrag={kind:'sym-resize',ref:hs,ox:p.x-(hs.x+hs.w),oy:p.y-(hs.y+hs.h)};
        fpSel={kind:'sym',ref:hs};
      }else{
        fpDrag={kind:'sym',ref:hs,ox:p.x-hs.x,oy:p.y-hs.y};
        fpSel={kind:'sym',ref:hs};
      }
    }else if(hl){
      if(Math.hypot(p.x-hl.x1,p.y-hl.y1)<12)
        fpDrag={kind:'line-p1',ref:hl};
      else if(Math.hypot(p.x-hl.x2,p.y-hl.y2)<12)
        fpDrag={kind:'line-p2',ref:hl};
      else
        fpDrag={kind:'line',ref:hl,ox:p.x-hl.x1,oy:p.y-hl.y1};
      fpSel={kind:'line',ref:hl};
    }else if(hr){
      if(fpIsResize(hr,p.x,p.y))fpDrag={kind:'room-resize',ref:hr,ox:p.x-(hr.x+hr.w),oy:p.y-(hr.y+hr.h)};
      else fpDrag={kind:'room',ref:hr,ox:p.x-hr.x,oy:p.y-hr.y};
      fpSel={kind:'room',ref:hr};
    }else{fpSel=null;}
    fpRender();return;
  }

  // ── 部屋配置（ドラッグで描く） ──
  if(ROOM_DEF[fpTool]){
    fpDrag={kind:'new-room',type:fpTool,x0:sp.x,y0:sp.y};
    return;
  }

  // ── 記号配置（タップで即配置） ──
  if(fpTool.startsWith('sym-')){
    fpSnap_();
    const def=fpSymDef(fpTool);
    const slbl={'sym-bed':'ベッド','sym-desk':'机','sym-door':'ドア','sym-door2':'引き戸','sym-win':'窓','sym-genkan':'框','sym-step':'段差','sym-tri':'','sym-circle':''};
    let nx=sp.x-def.w/2, ny=sp.y-def.h/2, nrot=0;
    // 窓・引き戸・框は壁線上へスナップ（最寄りの部屋壁or線に吸着し、向きも合わせる）
    if(fpTool==='sym-win'||fpTool==='sym-door2'||fpTool==='sym-genkan'){
      const snap=fpNearestWall(p.x,p.y,60);
      if(snap){
        if(snap.orient==='h'){ // 水平壁
          nx=fpSnap(p.x)-def.w/2; ny=snap.pos-def.h/2; nrot=0;
        }else{ // 垂直壁
          nx=snap.pos-def.h/2; ny=fpSnap(p.y)-def.w/2; nrot=90;
        }
      }
    }
    const neo={id:fpNid++,type:fpTool,x:nx,y:ny,w:def.w,h:def.h,rot:nrot,label:slbl[fpTool]||''};
    fpSyms.push(neo);
    fpSel={kind:'sym',ref:neo};
    fpSetTool('sel'); // 配置後は自動で選択モードへ（連続クリックで複製されない）
    fpRender();return;
  }

  // ── 線（ドラッグで描画） ──
  if(fpTool==='line'||fpTool==='dash'){
    fpLineDraw={x0:sp.x,y0:sp.y,type:fpTool};
    fpSetSb('ドラッグして線を引く — 離すと確定');
    return;
  }

  // ── コメント（付箋を配置し即インライン編集） ──
  if(fpTool==='text'){
    fpSnap_();
    const cm={id:fpNid++,x:p.x,y:p.y,text:''};
    fpTexts.push(cm);
    fpRenderStickies();
    fpSetTool('sel');
    setTimeout(()=>fpEditStickyInline(cm),50);
    return;
  }
}

function fpMove(e){
  // 線のドラッグプレビュー
  if(fpLineDraw){
    const p=fpGp(e);const sp=fpSnapPos(p);
    fpRender();
    const prev=document.createElementNS('http://www.w3.org/2000/svg','line');
    prev.setAttribute('x1',fpLineDraw.x0);prev.setAttribute('y1',fpLineDraw.y0);
    prev.setAttribute('x2',sp.x);prev.setAttribute('y2',sp.y);
    prev.setAttribute('stroke','#333');prev.setAttribute('stroke-width','2');
    if(fpLineDraw.type==='dash') prev.setAttribute('stroke-dasharray','6 4');
    prev.setAttribute('pointer-events','none');prev.setAttribute('opacity','0.5');
    fpcv.appendChild(prev);
    return;
  }
  if(!fpDrag)return;
  const p=fpGp(e);const sp=fpSnapPos(p);
  if(fpDrag.kind==='room'){
    fpDrag.ref.x=fpSnap(p.x-fpDrag.ox);fpDrag.ref.y=fpSnap(p.y-fpDrag.oy);
  }else if(fpDrag.kind==='room-resize'){
    fpDrag.ref.w=Math.max(GRID*2,fpSnap(p.x-fpDrag.ox-fpDrag.ref.x));
    fpDrag.ref.h=Math.max(GRID*2,fpSnap(p.y-fpDrag.oy-fpDrag.ref.y));
  }else if(fpDrag.kind==='sym'){
    fpDrag.ref.x=fpSnap(p.x-fpDrag.ox);fpDrag.ref.y=fpSnap(p.y-fpDrag.oy);
  }else if(fpDrag.kind==='sym-resize'){
    fpDrag.ref.w=Math.max(GRID,fpSnap(p.x-fpDrag.ox-fpDrag.ref.x));
    fpDrag.ref.h=Math.max(GRID,fpSnap(p.y-fpDrag.oy-fpDrag.ref.y));
  }else if(fpDrag.kind==='sym-rot'){
    const curAngle=Math.atan2(p.y-fpDrag.cy,p.x-fpDrag.cx)*180/Math.PI;
    let newRot=fpDrag.initRot+(curAngle-fpDrag.startAngle);
    // 15度スナップ
    newRot=Math.round(newRot/15)*15;
    fpDrag.ref.rot=((newRot%360)+360)%360;
  }else if(fpDrag.kind==='line-p1'){
    fpDrag.ref.x1=sp.x;fpDrag.ref.y1=sp.y;
  }else if(fpDrag.kind==='line-p2'){
    fpDrag.ref.x2=sp.x;fpDrag.ref.y2=sp.y;
  }else if(fpDrag.kind==='line'){
    const ddx=fpSnap(p.x-fpDrag.ox)-fpDrag.ref.x1;
    const ddy=fpSnap(p.y-fpDrag.oy)-fpDrag.ref.y1;
    fpDrag.ref.x1+=ddx;fpDrag.ref.y1+=ddy;fpDrag.ref.x2+=ddx;fpDrag.ref.y2+=ddy;
    fpDrag.ox=p.x;fpDrag.oy=p.y;
  }else if(fpDrag.kind==='new-room'){
    // preview
    fpRender();
    const x=Math.min(fpDrag.x0,sp.x),y=Math.min(fpDrag.y0,sp.y);
    const w=Math.max(GRID,Math.abs(sp.x-fpDrag.x0)),h=Math.max(GRID,Math.abs(sp.y-fpDrag.y0));
    const def=ROOM_DEF[fpDrag.type];
    const pr=document.createElementNS('http://www.w3.org/2000/svg','rect');
    pr.setAttribute('x',x);pr.setAttribute('y',y);pr.setAttribute('width',w);pr.setAttribute('height',h);
    pr.setAttribute('fill',def.fill);pr.setAttribute('stroke',def.stroke);pr.setAttribute('stroke-width','2');
    pr.setAttribute('fill-opacity','.7');pr.setAttribute('pointer-events','none');
    fpcv.appendChild(pr);
    return;
  }
  fpRender();
}

function fpUp(e){
  // 線ドラッグ完了
  if(fpLineDraw){
    const p=fpGp(e);const sp=fpSnapPos(p);
    if(Math.hypot(sp.x-fpLineDraw.x0,sp.y-fpLineDraw.y0)>8){
      fpSnap_();
      const neo={id:fpNid++,type:fpLineDraw.type,x1:fpLineDraw.x0,y1:fpLineDraw.y0,x2:sp.x,y2:sp.y};
      fpLines.push(neo);
      fpSel={kind:'line',ref:neo};
    }
    fpLineDraw=null;
    fpSetTool('sel');
    fpRender();return;
  }
  if(!fpDrag)return;
  if(fpDrag.kind==='new-room'){
    const p=fpGp(e);const sp=fpSnapPos(p);
    const x=Math.min(fpDrag.x0,sp.x),y=Math.min(fpDrag.y0,sp.y);
    const w=Math.max(GRID*2,Math.abs(sp.x-fpDrag.x0));
    const h=Math.max(GRID*2,Math.abs(sp.y-fpDrag.y0));
    fpSnap_();
    const def=ROOM_DEF[fpDrag.type];
    const neo={id:fpNid++,type:fpDrag.type,x,y,w,h,label:def.label};
    fpRooms.push(neo);
    fpSel={kind:'room',ref:neo};
    fpDrag=null;
    fpSetTool('sel'); // 配置後は自動で選択モードへ
    fpRender();return;
  }else{
    fpSnap_();
  }
  fpDrag=null;fpRender();
}

// ── 最寄りの壁線を探索（窓・引き戸のスナップ用） ──
// 戻り値: {orient:'h'|'v', pos:y or x} or null
function fpNearestWall(px,py,tol){
  tol=tol||60;
  let best=null, bestD=tol;
  // 部屋の四辺
  for(const r of fpRooms){
    const edges=[
      {orient:'h', pos:r.y,     a:r.x, b:r.x+r.w},
      {orient:'h', pos:r.y+r.h, a:r.x, b:r.x+r.w},
      {orient:'v', pos:r.x,     a:r.y, b:r.y+r.h},
      {orient:'v', pos:r.x+r.w, a:r.y, b:r.y+r.h},
    ];
    for(const e of edges){
      if(e.orient==='h'){
        if(px<e.a-10||px>e.b+10) continue;
        const d=Math.abs(py-e.pos);
        if(d<bestD){bestD=d; best={orient:'h',pos:e.pos};}
      }else{
        if(py<e.a-10||py>e.b+10) continue;
        const d=Math.abs(px-e.pos);
        if(d<bestD){bestD=d; best={orient:'v',pos:e.pos};}
      }
    }
  }
  // 実線/破線
  for(const l of fpLines){
    if(Math.abs(l.y1-l.y2)<3){ // ほぼ水平
      const minx=Math.min(l.x1,l.x2), maxx=Math.max(l.x1,l.x2);
      if(px<minx-10||px>maxx+10) continue;
      const d=Math.abs(py-l.y1);
      if(d<bestD){bestD=d; best={orient:'h',pos:l.y1};}
    }else if(Math.abs(l.x1-l.x2)<3){ // ほぼ垂直
      const miny=Math.min(l.y1,l.y2), maxy=Math.max(l.y1,l.y2);
      if(py<miny-10||py>maxy+10) continue;
      const d=Math.abs(px-l.x1);
      if(d<bestD){bestD=d; best={orient:'v',pos:l.x1};}
    }
  }
  return best;
}

function fpDelSel(){
  if(!fpSel)return;fpSnap_();
  if(fpSel.kind==='room')fpRooms=fpRooms.filter(r=>r.id!==fpSel.ref.id);
  else if(fpSel.kind==='sym')fpSyms=fpSyms.filter(s=>s.id!==fpSel.ref.id);
  else if(fpSel.kind==='line')fpLines=fpLines.filter(l=>l.id!==fpSel.ref.id);
  fpSel=null;fpRender();
}

// ── コピー（選択中の要素をクリップボードに保存） ──
function fpCopy(){
  if(!fpSel)return;
  fpClipboard=JSON.parse(JSON.stringify(fpSel)); // ディープコピー
  fpSetSb('コピーしました ─ Ctrl+V で貼り付け / Ctrl+D で複製');
}

// ── ペースト（20pxずらして複製） ──
function fpPaste(){
  if(!fpClipboard)return;
  fpSnap_();
  const offset=20; // ずらし量（px）
  if(fpClipboard.kind==='room'){
    const src=fpClipboard.ref;
    const neo={...src, id:fpNid++, x:src.x+offset, y:src.y+offset};
    fpRooms.push(neo);
    fpSel={kind:'room',ref:neo};
    // 次のペーストでさらにずれるようクリップボードも更新
    fpClipboard=JSON.parse(JSON.stringify({kind:'room',ref:neo}));
  }else if(fpClipboard.kind==='sym'){
    const src=fpClipboard.ref;
    const neo={...src, id:fpNid++, x:src.x+offset, y:src.y+offset};
    fpSyms.push(neo);
    fpSel={kind:'sym',ref:neo};
    fpClipboard=JSON.parse(JSON.stringify({kind:'sym',ref:neo}));
  }else if(fpClipboard.kind==='line'){
    const src=fpClipboard.ref;
    const neo={...src, id:fpNid++, x1:src.x1+offset, y1:src.y1+offset, x2:src.x2+offset, y2:src.y2+offset};
    fpLines.push(neo);
    fpSel={kind:'line',ref:neo};
    fpClipboard=JSON.parse(JSON.stringify({kind:'line',ref:neo}));
  }
  fpRender();
}

// ── 記号定義 ──
function fpSymDef(type){
  const defs={
    'sym-bed'   :{w:40, h:30},
    'sym-desk'  :{w:60, h:50},
    'sym-door'  :{w:60, h:60},  // ドア（弧）: 幅=ドア幅, 高さ=ドア幅（正方形が理想）
    'sym-door2' :{w:80, h:6},   // 引き戸: 横長・薄い
    'sym-win'   :{w:80, h:8},   // 窓: 横長・薄い
    'sym-genkan':{w:80, h:10},  // 玄関框: 横長・薄い
    'sym-step'  :{w:20, h:16},
    'sym-tri'   :{w:80, h:80},   // 三角形: 正三角に近い
    'sym-circle':{w:40, h:40},   // 丸: 柱など
  };
  return defs[type]||{w:60,h:60};
}

// ── SVG描画 ──
function fpRenderRoom(r){
  const def=ROOM_DEF[r.type]||ROOM_DEF['room-x'];
  const isSel=fpSel&&fpSel.kind==='room'&&fpSel.ref.id===r.id;
  const sw=isSel?2.5:1.5;
  const selR=isSel?`<rect x="${r.x-2}" y="${r.y-2}" width="${r.w+4}" height="${r.h+4}" rx="2" fill="none" stroke="#1555a0" stroke-width="2" stroke-dasharray="4 2" pointer-events="none"/>`:'';

  // 和室は畳目ハッチ
  let hatch='';
  if(r.type==='room-j'){
    // 縦横の薄いライン
    for(let xx=r.x+GRID;xx<r.x+r.w;xx+=GRID)
      hatch+=`<line x1="${xx}" y1="${r.y}" x2="${xx}" y2="${r.y+r.h}" stroke="${def.stroke}" stroke-width=".4" stroke-opacity=".5" pointer-events="none"/>`;
    for(let yy=r.y+GRID;yy<r.y+r.h;yy+=GRID)
      hatch+=`<line x1="${r.x}" y1="${yy}" x2="${r.x+r.w}" y2="${yy}" stroke="${def.stroke}" stroke-width=".4" stroke-opacity=".5" pointer-events="none"/>`;
  }
  // 階段は斜線
  if(r.type==='room-s'){
    for(let d=GRID;d<r.w+r.h;d+=GRID*1.5)
      hatch+=`<line x1="${r.x+Math.max(0,d-r.h)}" y1="${r.y+Math.min(r.h,d)}" x2="${r.x+Math.min(r.w,d)}" y2="${r.y+Math.max(0,d-r.w)}" stroke="${def.stroke}" stroke-width=".6" stroke-opacity=".5" pointer-events="none"/>`;
  }

  // リサイズハンドル
  const rh=isSel?`<circle cx="${r.x+r.w}" cy="${r.y+r.h}" r="8" fill="${def.stroke}" fill-opacity=".3" stroke="${def.stroke}" stroke-width="1" class="fp-rh" data-id="${r.id}"/><text x="${r.x+r.w}" y="${r.y+r.h+4}" text-anchor="middle" font-size="9" fill="${def.stroke}" pointer-events="none">⤡</text>`:'';

  return`<g>
  <rect x="${r.x}" y="${r.y}" width="${r.w}" height="${r.h}" fill="${def.fill}" stroke="${def.stroke}" stroke-width="${sw}" rx="2"/>
  ${hatch}
  <text x="${r.x+r.w/2}" y="${r.y+r.h/2+5}" text-anchor="middle" font-size="12" font-weight="600" fill="${def.stroke}" pointer-events="none">${r.label}</text>
  ${selR}${rh}
  <rect x="${r.x}" y="${r.y}" width="${r.w}" height="${r.h}" fill="transparent" class="fp-room-hit" data-id="${r.id}" style="cursor:move" pointer-events="none"/>
</g>`;
}

function fpRenderSym(s){
  const isSel=fpSel&&fpSel.kind==='sym'&&fpSel.ref.id===s.id;
  const rot=s.rot||0;
  const cx=s.x+s.w/2, cy=s.y+s.h/2;
  const xf=rot?`transform="rotate(${rot},${cx},${cy})"`:'';
  let inner='';

  if(s.type==='sym-bed'){
    // ベッド: 枕側（上）を薄青で表現
    const ph=Math.round(s.h*0.35);
    inner=`
    <rect x="${s.x}" y="${s.y}" width="${s.w}" height="${s.h}" rx="3" fill="#dbeeff" stroke="#3060a0" stroke-width="1.5"/>
    <rect x="${s.x+2}" y="${s.y+2}" width="${s.w-4}" height="${ph}" rx="2" fill="#a8ccf0" stroke="none"/>
    <text x="${cx}" y="${s.y+ph+Math.round((s.h-ph)/2)+5}" text-anchor="middle" font-size="9" fill="#3060a0" pointer-events="none">${s.label||'ベッド'}</text>`;

  }else if(s.type==='sym-desk'){
    inner=`
    <rect x="${s.x}" y="${s.y}" width="${s.w}" height="${s.h}" rx="2" fill="#f5edda" stroke="#806040" stroke-width="1.5"/>
    <text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="10" fill="#806040" pointer-events="none">${s.label||'机'}</text>`;

  }else if(s.type==='sym-door'){
    // 建築図面標準ドア記号:
    //  左辺=壁（太い縦線）、下辺=ドア枠線、弧=開き軌跡
    //  開き方向: 左蝶番、右開き（弧は左下→右上方向）
    const r=Math.min(s.w,s.h); // 半径=ドア幅
    inner=`
    <line x1="${s.x}" y1="${s.y}" x2="${s.x}" y2="${s.y+r}" stroke="#222" stroke-width="3" stroke-linecap="round"/>
    <line x1="${s.x}" y1="${s.y+r}" x2="${s.x+r}" y2="${s.y+r}" stroke="#222" stroke-width="1.5"/>
    <path d="M ${s.x} ${s.y} A ${r} ${r} 0 0 1 ${s.x+r} ${s.y+r}"
      fill="none" stroke="#222" stroke-width="1.5"/>
    <text x="${s.x+r/2}" y="${s.y+r+14}" text-anchor="middle" font-size="9" fill="#444" pointer-events="none">${s.label||'ドア'}</text>`;

  }else if(s.type==='sym-door2'){
    // 引き戸: 細い枠 + 中央にスライド矢印
    inner=`
    <rect x="${s.x}" y="${s.y}" width="${s.w}" height="${s.h}" fill="#f0f0f0" stroke="#444" stroke-width="2"/>
    <rect x="${s.x+2}" y="${s.y+2}" width="${s.w*0.6}" height="${s.h-4}" fill="#dde8f5" stroke="#3060a0" stroke-width="1"/>
    <line x1="${s.x+s.w*0.55}" y1="${cy}" x2="${s.x+s.w-4}" y2="${cy}" stroke="#3060a0" stroke-width="1.5" marker-end="url(#fp-arr)"/>
    <text x="${cx}" y="${s.y+s.h+14}" text-anchor="middle" font-size="9" fill="#444" pointer-events="none">${s.label||'引き戸'}</text>`;

  }else if(s.type==='sym-win'){
    // 窓: 建築図面標準 — 外壁2線の間に3本線（ガラス2枚＋框）
    const mid=s.y+s.h/2;
    const q1=s.y+s.h*0.25, q3=s.y+s.h*0.75;
    inner=`
    <rect x="${s.x}" y="${s.y}" width="${s.w}" height="${s.h}" fill="#e8f4ff" stroke="#3878a0" stroke-width="2"/>
    <line x1="${s.x}" y1="${q1}" x2="${s.x+s.w}" y2="${q1}" stroke="#3878a0" stroke-width="1"/>
    <line x1="${s.x}" y1="${q3}" x2="${s.x+s.w}" y2="${q3}" stroke="#3878a0" stroke-width="1"/>
    <text x="${cx}" y="${s.y+s.h+14}" text-anchor="middle" font-size="9" fill="#3878a0" pointer-events="none">${s.label||'窓'}</text>`;

  }else if(s.type==='sym-genkan'){
    // 玄関框（上がり框）: 二重線で段差を表現
    const mid=s.y+s.h/2;
    inner=`
    <rect x="${s.x}" y="${s.y}" width="${s.w}" height="${s.h}" fill="#e8f0e0" stroke="#508040" stroke-width="2"/>
    <line x1="${s.x+4}" y1="${mid}" x2="${s.x+s.w-4}" y2="${mid}" stroke="#508040" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="${cx}" y="${s.y-4}" text-anchor="middle" font-size="9" fill="#508040" pointer-events="none">${s.label||'框'}</text>`;

  }else if(s.type==='sym-step'){
    // 段差: 背景なし・小さな▲アイコンのみ。境目に重ねて使う
    inner=`
    <polygon points="${cx},${s.y} ${s.x},${s.y+s.h} ${s.x+s.w},${s.y+s.h}"
      fill="#f5c800" fill-opacity="0.92" stroke="#a08000" stroke-width="1.5"
      stroke-linejoin="round"/>`;

  }else if(s.type==='sym-tri'){
    // 三角形: 斜め壁や変形部屋に使用
    inner=`
    <polygon points="${cx},${s.y} ${s.x},${s.y+s.h} ${s.x+s.w},${s.y+s.h}"
      fill="#f0f0f0" fill-opacity="0.6" stroke="#555" stroke-width="2"
      stroke-linejoin="round"/>`;

  }else if(s.type==='sym-circle'){
    // 丸: 柱など
    const rx=s.w/2, ry=s.h/2;
    inner=`
    <ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}"
      fill="#f0f0f0" fill-opacity="0.6" stroke="#555" stroke-width="2"/>`;
  }

  // 選択ハンドル（リサイズ＋回転）
  const selO=isSel?`
  <rect x="${s.x-3}" y="${s.y-3}" width="${s.w+6}" height="${s.h+6}" fill="none" stroke="#1555a0" stroke-width="1.5" stroke-dasharray="3 2" rx="2" pointer-events="none"/>
  <circle cx="${s.x+s.w}" cy="${s.y+s.h}" r="8" fill="#fff" stroke="#1555a0" stroke-width="1.5" class="fp-sym-rh" data-id="${s.id}" style="cursor:se-resize" title="リサイズ"/>
  <text x="${s.x+s.w}" y="${s.y+s.h+4}" text-anchor="middle" font-size="9" fill="#1555a0" pointer-events="none">⤡</text>
  <circle cx="${s.x+s.w}" cy="${s.y}" r="8" fill="#fff" stroke="#e07000" stroke-width="1.5" class="fp-sym-rot" data-id="${s.id}" style="cursor:grab" title="回転"/>
  <text x="${s.x+s.w}" y="${s.y+4}" text-anchor="middle" font-size="10" fill="#e07000" pointer-events="none">↻</text>`:'';

  return`<g ${xf}>${inner}
  <rect x="${s.x}" y="${s.y}" width="${s.w}" height="${s.h}" fill="transparent" class="fp-sym-hit" data-id="${s.id}" style="cursor:move" pointer-events="all"/>
  ${selO}
</g>`;
}

function fpRenderLine(l){
  const isSel=fpSel&&fpSel.kind==='line'&&fpSel.ref.id===l.id;
  const dash=l.type==='dash'?'stroke-dasharray="8 5"':'';
  const col=isSel?'#1555a0':'#404040';
  const sw=isSel?2.5:1.8;
  return`<g>
  <line x1="${l.x1}" y1="${l.y1}" x2="${l.x2}" y2="${l.y2}" stroke="transparent" stroke-width="14" class="fp-line-hit" data-id="${l.id}" style="cursor:pointer"/>
  <line x1="${l.x1}" y1="${l.y1}" x2="${l.x2}" y2="${l.y2}" stroke="${col}" stroke-width="${sw}" ${dash} pointer-events="none"/>
  ${isSel?`<circle cx="${l.x1}" cy="${l.y1}" r="5" fill="${col}" opacity=".4" pointer-events="none"/><circle cx="${l.x2}" cy="${l.y2}" r="5" fill="${col}" opacity=".4" pointer-events="none"/>`:''}
</g>`;
}

function fpRender(){
  // キャンバス自動拡張
  const allX=[...fpRooms.map(r=>r.x+r.w),...fpSyms.map(s=>s.x+s.w),...fpLines.map(l=>Math.max(l.x1,l.x2))];
  const allY=[...fpRooms.map(r=>r.y+r.h),...fpSyms.map(s=>s.y+s.h),...fpLines.map(l=>Math.max(l.y1,l.y2))];
  if(allX.length){
    const mxX=Math.max(...allX)+100,mxY=Math.max(...allY)+100;
    if(mxX>+fpcv.getAttribute('width'))fpcv.setAttribute('width',mxX+200);
    if(mxY>+fpcv.getAttribute('height'))fpcv.setAttribute('height',mxY+200);
  }

  fpcv.innerHTML=`<defs>
  <marker id="fp-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto">
    <path d="M2 2L8 5L2 8" fill="none" stroke="#3060a0" stroke-width="2" stroke-linecap="round"/>
  </marker>
</defs>
${fpRooms.map(fpRenderRoom).join('')}
${fpLines.map(fpRenderLine).join('')}
${fpSyms.map(fpRenderSym).join('')}
${fpLineDraw?`
  <circle cx="${fpLineDraw.x0}" cy="${fpLineDraw.y0}" r="6" fill="#1555a0" fill-opacity=".5" pointer-events="none"/>
  ${fpLinePreview?`<line x1="${fpLineDraw.x0}" y1="${fpLineDraw.y0}" x2="${fpLinePreview.x}" y2="${fpLinePreview.y}" stroke="#1555a0" stroke-width="1.5" stroke-dasharray="4 3" stroke-opacity=".6" pointer-events="none"/>
  <circle cx="${fpLinePreview.x}" cy="${fpLinePreview.y}" r="4" fill="#1555a0" fill-opacity=".4" pointer-events="none"/>`:''}
`:''}`;

  // hit handlers
  fpcv.querySelectorAll('.fp-room-hit').forEach(el=>{
    fpAddHit(el,ev=>{
      if(fpTool!=='sel')return;
      const r=fpRooms.find(r=>r.id===+el.dataset.id);if(!r)return;
      const p=fpGp(ev);
      if(fpIsResize(r,p.x,p.y))fpDrag={kind:'room-resize',ref:r,ox:p.x-(r.x+r.w),oy:p.y-(r.y+r.h)};
      else fpDrag={kind:'room',ref:r,ox:p.x-r.x,oy:p.y-r.y};
      fpSel={kind:'room',ref:r};fpRender();
    });
  });
  fpcv.querySelectorAll('.fp-rh').forEach(el=>{
    fpAddHit(el,ev=>{
      if(fpTool!=='sel')return;
      const r=fpRooms.find(r=>r.id===+el.dataset.id);if(!r)return;
      const p=fpGp(ev);
      fpDrag={kind:'room-resize',ref:r,ox:p.x-(r.x+r.w),oy:p.y-(r.y+r.h)};
      fpSel={kind:'room',ref:r};fpRender();
    });
  });
  fpcv.querySelectorAll('.fp-sym-hit').forEach(el=>{
    fpAddHit(el,ev=>{
      if(fpTool!=='sel')return;
      const s=fpSyms.find(s=>s.id===+el.dataset.id);if(!s)return;
      const p=fpGp(ev);
      fpDrag={kind:'sym',ref:s,ox:p.x-s.x,oy:p.y-s.y};
      fpSel={kind:'sym',ref:s};fpRender();
    });
  });
  fpcv.querySelectorAll('.fp-sym-rh').forEach(el=>{
    fpAddHit(el,ev=>{
      if(fpTool!=='sel')return;
      ev.stopPropagation();
      const s=fpSyms.find(s=>s.id===+el.dataset.id);if(!s)return;
      const p=fpGp(ev);
      fpDrag={kind:'sym-resize',ref:s,ox:p.x-(s.x+s.w),oy:p.y-(s.y+s.h)};
      fpSel={kind:'sym',ref:s};fpRender();
    });
  });
  fpcv.querySelectorAll('.fp-sym-rot').forEach(el=>{
    fpAddHit(el,ev=>{
      if(fpTool!=='sel')return;
      ev.stopPropagation();
      const s=fpSyms.find(s=>s.id===+el.dataset.id);if(!s)return;
      const p=fpGp(ev);
      const scx=s.x+s.w/2,scy=s.y+s.h/2;
      const startAngle=Math.atan2(p.y-scy,p.x-scx)*180/Math.PI;
      fpDrag={kind:'sym-rot',ref:s,startAngle,initRot:s.rot||0,cx:scx,cy:scy};
      fpSel={kind:'sym',ref:s};fpRender();
    });
  });
  fpcv.querySelectorAll('.fp-line-hit').forEach(el=>{
    fpAddHit(el,ev=>{
      if(fpTool!=='sel')return;
      const l=fpLines.find(l=>l.id===+el.dataset.id);if(!l)return;
      const p=fpGp(ev);
      fpDrag={kind:'line',ref:l,ox:p.x,oy:p.y};
      fpSel={kind:'line',ref:l};fpRender();
    });
  });
  fpcv.querySelectorAll('.fp-line-p1').forEach(el=>{
    fpAddHit(el,ev=>{
      if(fpTool!=='sel')return;
      const l=fpLines.find(l=>l.id===+el.dataset.id);if(!l)return;
      fpDrag={kind:'line-p1',ref:l};fpSel={kind:'line',ref:l};fpRender();
    });
  });
  fpcv.querySelectorAll('.fp-line-p2').forEach(el=>{
    fpAddHit(el,ev=>{
      if(fpTool!=='sel')return;
      const l=fpLines.find(l=>l.id===+el.dataset.id);if(!l)return;
      fpDrag={kind:'line-p2',ref:l};fpSel={kind:'line',ref:l};fpRender();
    });
  });

  fpRenderStickies();
}

function fpAddHit(el,handler){
  el.addEventListener('mousedown',ev=>{if(ev.button!==0)return;ev.stopPropagation();handler(ev);},{passive:false});
  el.addEventListener('touchstart',ev=>{ev.preventDefault();ev.stopPropagation();handler(fpNorm(ev));},{passive:false});
}

window.addEventListener('mousemove',ev=>{
  if(!fpStickyDrag)return;
  const r=document.getElementById('fp-wrap').getBoundingClientRect();
  fpStickyDrag.cm.x=ev.clientX-r.left-fpStickyDrag.ox;
  fpStickyDrag.cm.y=ev.clientY-r.top-fpStickyDrag.oy;
  fpStickyDrag.div.style.left=fpStickyDrag.cm.x+'px';
  fpStickyDrag.div.style.top=fpStickyDrag.cm.y+'px';
});
window.addEventListener('touchmove',ev=>{
  if(!fpStickyDrag)return;
  ev.preventDefault();
  const t=ev.touches[0];
  const r=document.getElementById('fp-wrap').getBoundingClientRect();
  fpStickyDrag.cm.x=t.clientX-r.left-fpStickyDrag.ox;
  fpStickyDrag.cm.y=t.clientY-r.top-fpStickyDrag.oy;

  fpStickyDrag.div.style.top=fpStickyDrag.cm.y+'px';
},{passive:false});
window.addEventListener('mouseup',()=>{if(fpStickyDrag){fpSnap_();fpStickyDrag=null;}});
window.addEventListener('touchend',()=>{if(fpStickyDrag){fpSnap_();fpStickyDrag=null;}},{passive:false});

function fpRenderStickies(){
  const wrap=document.getElementById('fp-sticky-wrap');
  wrap.innerHTML='';
  fpTexts.forEach(cm=>{
    const div=document.createElement('div');
    div.className='sticky';
    div.dataset.cmId=cm.id;
    div.style.left=cm.x+'px';div.style.top=cm.y+'px';

    const span=document.createElement('span');
    span.className='sticky-text';
    span.textContent=cm.text;
    div.appendChild(span);

    const del=document.createElement('button');
    del.className='sticky-del';del.textContent='✕';
    const onDel=ev=>{ev.stopPropagation();ev.preventDefault();fpSnap_();fpTexts=fpTexts.filter(t=>t.id!==cm.id);fpRenderStickies();};
    del.addEventListener('click',onDel);del.addEventListener('touchstart',onDel,{passive:false});
    div.appendChild(del);

    let lastTap=0;
    div.addEventListener('dblclick',ev=>{ev.stopPropagation();fpEditStickyInline(cm);});
    div.addEventListener('touchend',ev=>{const now=Date.now();if(now-lastTap<350&&!fpStickyDrag){ev.stopPropagation();ev.preventDefault();fpEditStickyInline(cm);}lastTap=now;},{passive:false});
    div.addEventListener('mousedown',ev=>{if(ev.button!==0)return;if(ev.target.closest('.sticky-del'))return;ev.stopPropagation();const r=document.getElementById('fp-wrap').getBoundingClientRect();fpStickyDrag={cm,div,ox:ev.clientX-r.left-cm.x,oy:ev.clientY-r.top-cm.y};});
    div.addEventListener('touchstart',ev=>{if(ev.target.closest('.sticky-del'))return;ev.stopPropagation();const t=ev.touches[0];const r=document.getElementById('fp-wrap').getBoundingClientRect();fpStickyDrag={cm,div,ox:t.clientX-r.left-cm.x,oy:t.clientY-r.top-cm.y};},{passive:true});
    wrap.appendChild(div);
  });
}

function fpEditStickyInline(cm){
  const wrap=document.getElementById('fp-sticky-wrap');
  const div=wrap.querySelector(`.sticky[data-cm-id="${cm.id}"]`);
  if(!div) return;
  const span=div.querySelector('.sticky-text');
  if(!span) return;

  span.contentEditable='true';
  span.style.cursor='text';
  span.style.minWidth='60px';
  span.style.display='inline-block';
  div.style.outline='2px solid #e6a200';
  span.focus();

  const range=document.createRange();
  range.selectNodeContents(span);
  range.collapse(false);
  const s=window.getSelection();
  s.removeAllRanges();s.addRange(range);

  let done=false;
  const finish=()=>{
    if(done) return; done=true;
    const text=span.textContent.trim();
    fpSnap_();
    if(text===''){fpTexts=fpTexts.filter(t=>t.id!==cm.id);}
    else{cm.text=text;}
    fpRenderStickies();
  };
  span.addEventListener('blur',finish,{once:true});
  span.addEventListener('keydown',ev=>{
    if(ev.key==='Enter'&&!ev.shiftKey){ev.preventDefault();span.blur();}
    if(ev.key==='Escape'){ev.preventDefault();span.blur();}
  });
}

function fpGetBounds(){
  const all=[
    ...fpRooms.map(r=>({x:r.x,y:r.y,x2:r.x+r.w,y2:r.y+r.h})),
    ...fpSyms.map(s=>({x:s.x,y:s.y,x2:s.x+s.w+20,y2:s.y+s.h+20})),
    ...fpLines.map(l=>({x:Math.min(l.x1,l.x2),y:Math.min(l.y1,l.y2),x2:Math.max(l.x1,l.x2),y2:Math.max(l.y1,l.y2)})),
    ...fpTexts.map(t=>({x:t.x,y:t.y,x2:t.x+180,y2:t.y+60})),
  ];
  if(!all.length)return{x:0,y:0,w:600,h:400};
  const x=Math.max(0,Math.min(...all.map(b=>b.x))-30);
  const y=Math.max(0,Math.min(...all.map(b=>b.y))-30);
  const x2=Math.max(...all.map(b=>b.x2))+30;
  const y2=Math.max(...all.map(b=>b.y2))+30;
  return{x,y,w:x2-x,h:y2-y};
}

async function fpRenderToCanvas(scale=2){
  const b=fpGetBounds();
  const clone=fpcv.cloneNode(true);
  clone.querySelectorAll('.fp-room-hit,.fp-sym-hit,.fp-line-hit,.fp-rh,.fp-sym-rh').forEach(e=>e.remove());
  // 付箋をSVGテキストとして追加
  fpTexts.forEach(cm=>{
    const lines=cm.text.split('\n');
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    const bw=Math.min(200,Math.max(100,lines.reduce((m,l)=>Math.max(m,l.length),0)*7+16));
    const bh=lines.length*18+10;
    const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',cm.x);rect.setAttribute('y',cm.y);
    rect.setAttribute('width',bw);rect.setAttribute('height',bh);
    rect.setAttribute('rx','4');rect.setAttribute('fill','#fef9c3');
    rect.setAttribute('stroke','#e6d84a');rect.setAttribute('stroke-width','1');
    g.appendChild(rect);
    lines.forEach((line,i)=>{
      const t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x',cm.x+8);t.setAttribute('y',cm.y+18+i*18);
      t.setAttribute('font-size','12');t.setAttribute('fill','#3a3000');t.setAttribute('font-family','sans-serif');
      t.textContent=line;g.appendChild(t);
    });
    clone.appendChild(g);
  });
  // 白背景
  const bg=document.createElementNS('http://www.w3.org/2000/svg','rect');
  bg.setAttribute('x',b.x);bg.setAttribute('y',b.y);bg.setAttribute('width',b.w);bg.setAttribute('height',b.h);bg.setAttribute('fill','#ffffff');
  clone.insertBefore(bg,clone.firstChild);
  clone.setAttribute('width',b.w*scale);clone.setAttribute('height',b.h*scale);
  clone.setAttribute('viewBox',`${b.x} ${b.y} ${b.w} ${b.h}`);
  const svgStr=new XMLSerializer().serializeToString(clone);
  const svgB64=btoa(unescape(encodeURIComponent(svgStr)));
  const dataUrl='data:image/svg+xml;base64,'+svgB64;
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      try{
        const canvas=document.createElement('canvas');
        canvas.width=b.w*scale;canvas.height=b.h*scale;
        const ctx=canvas.getContext('2d');
        ctx.fillStyle='#ffffff';ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(img,0,0);resolve({canvas,b});
      }catch(err){reject(err);}
    };
    img.onerror=()=>reject(new Error('SVG画像の読み込みに失敗しました'));
    img.src=dataUrl;
  });
}
async function fpSavePNG(){
  if(!fpRooms.length&&!fpSyms.length&&!fpLines.length&&!fpTexts.length){alert('まだ何も配置されていません');return;}
  try{
    const{canvas}=await fpRenderToCanvas(2);
    await smartSavePNG('住宅見取り図',canvas,'mitorizu-save');
  }catch(e){alert('PNG保存失敗: '+e.message);}
}
async function fpSavePDF(){
  if(!fpRooms.length&&!fpSyms.length&&!fpLines.length&&!fpTexts.length){alert('まだ何も配置されていません');return;}
  try{
    const{canvas,b}=await fpRenderToCanvas(2);
    const{jsPDF}=window.jspdf;
    const mmW=b.w*.264583,mmH=b.h*.264583;
    const orient=mmW>mmH?'l':'p';
    const pdf=new jsPDF({orientation:orient,unit:'mm',format:'a4'});
    const pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight();
    const margin=10,sc=Math.min((pw-margin*2)/mmW,(ph-margin*2)/mmH,1);
    const fw=mmW*sc,fh=mmH*sc,ox=(pw-fw)/2,oy=(ph-fh)/2;
    pdf.addImage(canvas.toDataURL('image/png'),'PNG',ox,oy,fw,fh);
    pdf.save(autoFileName('住宅見取り図','pdf'));
  }catch(e){alert('PDF保存失敗: '+e.message);}
}

// 改善2: ツールバーからドラッグ&ドロップで人物を配置
// ════════════════════════════════════════════
(function(){
  const DRAG_TYPES=['male','female','unk'];
  let dndState=null; // {type, ghost}

  // ツールバーのボタンにdragstart設定
  DRAG_TYPES.forEach(t=>{
    const btn=document.getElementById('btn-'+t);
    if(!btn)return;
    btn.setAttribute('draggable','true');
    btn.addEventListener('dragstart',ev=>{
      ev.dataTransfer.setData('text/plain',t);
      ev.dataTransfer.effectAllowed='copy';
      // ゴーストアイコン
      const ghost=document.createElement('div');
      ghost.style.cssText='position:absolute;top:-100px;left:-100px;width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;pointer-events:none;';
      if(t==='male'){ghost.style.background='#e3f5ed';ghost.style.border='2px solid #1a7a56';ghost.textContent='□';}
      else if(t==='female'){ghost.style.background='#e3f5ed';ghost.style.border='2px solid #1a7a56';ghost.textContent='○';}
      else{ghost.style.background='#e3f5ed';ghost.style.border='2px solid #1a7a56';ghost.textContent='△';}
      document.body.appendChild(ghost);
      ev.dataTransfer.setDragImage(ghost,26,26);
      dndState={type:t,ghost};
    });
    btn.addEventListener('dragend',()=>{
      if(dndState&&dndState.ghost)dndState.ghost.remove();
      dndState=null;
    });
  });

  // キャンバスにdrop受け入れ設定
  cv.addEventListener('dragover',ev=>{ev.preventDefault();ev.dataTransfer.dropEffect='copy';});
  cv.addEventListener('drop',ev=>{
    ev.preventDefault();
    const t=ev.dataTransfer.getData('text/plain');
    if(!DRAG_TYPES.includes(t))return;
    const p=gp(ev);
    snap();
    const n={id:nid++,type:t,x:p.x,y:p.y,name:'',age:'',status:'alive',kp:false,note:''};
    nodes.push(n);render();selItem({kind:'node',ref:n});
    setSb('右パネルで名前・年齢を入力');
    if(dndState&&dndState.ghost)dndState.ghost.remove();
    dndState=null;
  });
})();

function showHelp(){
  const isGeno=document.getElementById('page-geno').classList.contains('on');
  document.getElementById('help-title').textContent=isGeno?'📋 ジェノグラム クイックリファレンス':'🏠 住宅見取り図 クイックリファレンス';
  document.getElementById('help-body').innerHTML=isGeno?HELP_GENO:HELP_FP;
  document.getElementById('help-modal').style.display='block';
}
function closeHelp(){
  document.getElementById('help-modal').style.display='none';
}
document.addEventListener('keydown',ev=>{
  if(ev.key==='Escape')closeHelp();
});
